name: Shell checks

on:
  push:
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check shell syntax
        run: |
          bash -n install.sh
          bash -n uninstall.sh
          bash -n scripts/notify-mobile.sh

      - name: Run ShellCheck
        run: |
          sudo apt-get update
          sudo apt-get install --no-install-recommends -y shellcheck
          shellcheck --severity=warning install.sh uninstall.sh scripts/notify-mobile.sh
